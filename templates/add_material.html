<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Add Material</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#f4f6f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}.topbar{background:#2d6a4f;color:white;width:100%;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;position:fixed;top:0;left:0;z-index:10}.topbar h1{font-size:18px;font-weight:700}.topbar a{color:white;text-decoration:none;background:rgba(255,255,255,.2);padding:6px 14px;border-radius:6px;font-size:13px}.wrap{margin-top:80px;width:100%;max-width:480px}.back{display:inline-block;font-size:13px;color:#2d6a4f;text-decoration:none;font-weight:600;margin-bottom:16px}.card{background:white;border-radius:14px;padding:32px;box-shadow:0 2px 10px rgba(0,0,0,.08)}h2{font-size:20px;color:#1a1a2e;margin-bottom:24px;font-weight:700}label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:5px}input,select{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:16px}input:focus,select:focus{outline:none;border-color:#2d6a4f}button{width:100%;padding:12px;background:#2d6a4f;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}button:hover{background:#1e4d37}.msg{margin-top:16px;padding:12px;border-radius:8px;text-align:center;font-size:14px;font-weight:500}.success{background:#d4edda;color:#1a5c35;border:1px solid #a8d5b5}.error{background:#fde8e8;color:#922;border:1px solid #f5c6c6}</style>
</head><body>
<div class="topbar"><h1>♻ Deadstock Inventory</h1><a href="/dashboard">← Dashboard</a></div>
<div class="wrap"><a href="/dashboard" class="back">← Back</a>
<div class="card"><h2>Add Material</h2>
<form method="POST">
  <label>Material Name</label><input name="material_name" required>
  <label>Sustainability Quality</label>
  <select name="sustainability_quality">
    <option value="High">High</option>
    <option value="Medium">Medium</option>
    <option value="Low">Low</option>
  </select>
  <button type="submit">Add Material</button>
</form>
{% if msg %}<div class="msg {{ msg[0] }}">{{ msg[1] }}</div>{% endif %}
</div></div></body></html>
