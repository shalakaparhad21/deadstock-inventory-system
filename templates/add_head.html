<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Add Head</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#f4f6f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}.topbar{background:#2d6a4f;color:white;width:100%;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;position:fixed;top:0;left:0;z-index:10}.topbar h1{font-size:18px;font-weight:700}.topbar a{color:white;text-decoration:none;background:rgba(255,255,255,.2);padding:6px 14px;border-radius:6px;font-size:13px}.wrap{margin-top:80px;width:100%;max-width:480px}.back{display:inline-block;font-size:13px;color:#2d6a4f;text-decoration:none;font-weight:600;margin-bottom:16px}.card{background:white;border-radius:14px;padding:32px;box-shadow:0 2px 10px rgba(0,0,0,.08)}h2{font-size:20px;color:#1a1a2e;margin-bottom:24px;font-weight:700}label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:5px}input,select{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:4px}input:focus,select:focus{outline:none;border-color:#2d6a4f}.hint{font-size:11px;color:#aaa;margin-bottom:12px}.req{color:#c00;margin-left:2px}button{width:100%;padding:12px;background:#2d6a4f;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}button:hover{background:#1e4d37}.msg{margin-top:16px;padding:12px;border-radius:8px;text-align:center;font-size:14px;font-weight:500}.success{background:#d4edda;color:#1a5c35;border:1px solid #a8d5b5}.error{background:#fde8e8;color:#922;border:1px solid #f5c6c6}</style>
</head><body>
<div class="topbar"><h1>♻ Deadstock Inventory</h1><a href="/dashboard">← Dashboard</a></div>
<div class="wrap"><a href="/dashboard" class="back">← Back</a>
<div class="card"><h2>Add Head</h2>
<form method="POST" id="addHeadForm">
  <label>Full Name <span class="req">*</span></label>
  <input name="name" required>
  <p class="hint">&nbsp;</p>
  <label>Email <span class="req">*</span></label>
  <input name="email" type="email" placeholder="e.g. user@company.com" required>
  <p class="hint">Must be a valid email address (e.g. name@domain.com)</p>
  <label>Contact Number</label>
  <input name="contact_no" type="tel" placeholder="e.g. 9876543210" id="contactInput" maxlength="10">
  <p class="hint">Optional — exactly 10 digits only (no spaces, letters or symbols)</p>
  <p class="hint">Head ID assigned automatically</p>
  <label>Role <span class="req">*</span></label>
  <select name="status" required>
    <option value="Branch">Branch Head</option>
    <option value="Warehouse">Warehouse Head</option>
    <option value="Stock_Allocation">Stock Allocation Head</option>
  </select>
  <p class="hint">&nbsp;</p>
  <label>Password <span class="req">*</span></label>
  <input name="password" type="password" required>
  <p class="hint">Minimum 4 characters</p>
  <button type="submit">Add Head</button>
</form>
{% if msg %}<div class="msg {{ msg[0] }}">{{ msg[1] }}</div>{% endif %}
</div></div>
<script>
  document.getElementById('contactInput').addEventListener('input', function(){
    this.value = this.value.replace(/\D/g,'').slice(0,10);
  });
  document.getElementById('addHeadForm').addEventListener('submit', function(e){
    var c = document.getElementById('contactInput').value;
    if(c && !/^\d{10}$/.test(c)){
      e.preventDefault();
      alert('Contact number must be exactly 10 digits (numbers only).');
    }
  });
</script>
</body></html>
