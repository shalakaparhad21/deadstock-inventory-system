<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Access Denied</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#f4f6f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:white;border-radius:16px;padding:48px 40px;box-shadow:0 4px 24px rgba(0,0,0,.1);text-align:center;max-width:400px;width:100%}
    .icon{font-size:48px;margin-bottom:16px}
    h1{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:8px}
    p{font-size:14px;color:#666;margin-bottom:28px}
    a{display:inline-block;background:#2d6a4f;color:white;padding:10px 24px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600}
    a:hover{background:#1e4d37}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>Access Denied</h1>
    <p>You do not have permission to access this section.</p>
    <a href="/dashboard">← Back to Dashboard</a>
  </div>
</body>
</html>
