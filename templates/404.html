<!DOCTYPE html>
<html>
<head><title>404 – Page Not Found</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9;
         display: flex; align-items: center; justify-content: center;
         min-height: 100vh; margin: 0; }
  .box { text-align: center; background: white; padding: 60px;
         border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); max-width: 480px; }
  .code { font-size: 80px; font-weight: 700; color: #2d6a4f; margin: 0; }
  h2   { color: #1a1a2e; margin: 8px 0 16px; }
  p    { color: #666; font-size: 15px; }
  a    { display: inline-block; margin-top: 20px; padding: 12px 28px;
         background: #2d6a4f; color: white; border-radius: 8px;
         text-decoration: none; font-weight: 500; }
  a:hover { background: #245a42; }
</style>
</head>
<body>
  <div class="box">
    <p class="code">404</p>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
